## Objective
Create a repository-only architecture baseline for Audiobookshelf in the existing Homelab. Record the current infrastructure, define the target component boundaries and produce the ordered child-issue plan. Do not deploy or mutate runtime state.

## Inputs

```yaml
platform:
  runtime_host: Raspberry Pi 5
  deployment_standard: docker_compose
  compose_authority: Homelab/Architecture
  reverse_proxy: existing_frontproxy
  identity_provider: existing_keycloak
storage:
  nas_address: 192.168.2.141
  protocol: NFS
  export_path: unresolved
  credentials_or_access_model: unresolved
constraints:
  reviewer_has_gitea_access: false
  github_is_review_transport: true
  all_services_run_in_docker: true
  nas_mount_is_separate_issue: true
```

## Required output
Create one focused architecture PR in the authoritative Gitea architecture repository. The PR must contain a versioned Audiobookshelf architecture document covering:

1. service boundary and Docker placement on the Pi5;
2. proposed Compose file location and persistent container paths;
3. internal Docker networks and reverse-proxy attachment;
4. authentication boundary through Keycloak;
5. authorization boundary and reference to the central Keycloak authorization work in #55;
6. local Break-Glass boundary without generating credentials;
7. logical NAS storage boundary using NFS to `192.168.2.141` without mounting it;
8. separation of source/drop-zone, quarantine/review, normalized library and Audiobookshelf-visible library;
9. separation between Slarti, Lydia, Eddie, Operator and Reviewer;
10. ordered child-issue dependency graph for deployment, SSO, authorization, NFS, import, metadata, scheduling, monitoring and backup.

## Required architecture decisions

```yaml
decisions:
  deployment:
    mechanism: docker_compose
    compose_versioned_in: Homelab/Architecture
  identity:
    authoritative_source: Keycloak
    local_standard_accounts_allowed: false
  break_glass:
    username: admin
    account_count: 1
    password_generation: Lydia_versioned_script
    password_transport: existing_Telegram_runtime_channel
    password_must_not_enter_github_gitea_logs_or_repository: true
    execution_in_this_issue: forbidden
  storage:
    nas_protocol: NFS
    nas_address: 192.168.2.141
    mount_implementation: separate_child_issue
    initial_access_preference: read_only
  import_pipeline:
    destructive_source_changes: forbidden_until_separately_authorized
    uncertain_matches: quarantine
    idempotency_required: true
```

