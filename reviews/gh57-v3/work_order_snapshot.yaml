## Required local evidence
Before opening the review handoff, Slarti must provide machine-readable or directly reproducible results for:

```yaml
local_evidence:
  - markdown_lint_or_repository_equivalent
  - link_and_reference_check
  - secret_scan
  - changed_file_list
  - source_head_sha
```

## CI gate
No review may start unless the authoritative Gitea PR CI/CD run has status `success`. The GitHub handoff must contain a concise CI summary and reference the exact run.

## Review package
Because the Reviewer cannot access Gitea, Slarti must publish a transportable review package through GitHub containing or referencing immutable artifacts:

```yaml
review_package:
  required:
    - manifest
    - work_order_snapshot
    - full_diff
    - changed_file_list
    - local_test_results
    - ci_summary
    - source_repository
    - source_pr_reference
    - source_head_sha
    - artifact_checksums
  issue_comments: short_references_only
```

The review package must be sufficient for review without access to Gitea. Missing evidence sets the ACP state to `evidence_incomplete`.

## State transitions

```text
ready
-> implementing
-> review_ready
-> approved | changes_requested | evidence_incomplete | blocked
-> merged | closed
```

- This work order is `ready`, not `autonomy_ready`; implementation begins only after a manual Operator trigger.
- `changes_requested` returns to `implementing`.
- Any commit after a verdict invalidates that verdict.
- Slarti self-checks are allowed but never constitute authoritative approval.
- The Reviewer may set or clear `blocked` and may request changes directly.

## Completion response in GitHub
Keep the issue comment short and provide only:

```yaml
handoff:
  source_pr: required
  source_head_sha: required
  ci_status: required
  ci_run: required
  review_package: required
  review_package_sha256: required
  acp_state: review_ready
```

